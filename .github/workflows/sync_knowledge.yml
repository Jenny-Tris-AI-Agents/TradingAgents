name: Strategy Knowledge Base Sync

on:
  push:
    paths:
      - 'research_papers/**.pdf' # CRITICAL: Ensure this matches your folder name exactly
  workflow_dispatch: 

jobs:
  build-knowledge:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to save Markdown summaries back to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5 # 2026 Node.js 24 Compatible

      - name: Set up Python
        uses: actions/setup-python@v6 # 2026 Node.js 24 Compatible
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-generativeai pypdf

      - name: Run Ingestion Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ingest_papers.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add knowledge_base/*.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update knowledge base" && git push)
