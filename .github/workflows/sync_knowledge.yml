name: Strategy Knowledge Base Sync

on:
  push:
    paths:
      - 'research_papers/**.pdf'
  workflow_dispatch: 

jobs:
  build-knowledge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install google-genai pypdf

      - name: Run Ingestion Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ingest_papers.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add knowledge_base/*.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update knowledge base" && git push)

      # 新增：任务完成后的 Discord 通知步骤
      - name: Send Notification to Discord
        if: always() # 无论成功还是失败都发送通知，方便你排查
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          status="${{ job.status }}"
          if [ "$status" = "success" ]; then
            msg="✅ 知识库同步成功！新论文已转化为策略摘要。"
          else
            msg="❌ 知识库同步失败！请检查 GitHub Actions 日志排查错误。"
          fi
          curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"$msg\"}" $DISCORD_WEBHOOK_URL
