name: Strategy Knowledge Base Sync

on:
  push:
    paths:
      - 'research_papers/**.pdf'
  workflow_dispatch: 

jobs:
  build-knowledge:
    runs-on: ubuntu-latest
    permissions:
      [cite_start]contents: write # 必须确保有写入权限 [cite: 83]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12' # 升级到 3.12 解决 2026 兼容性

      - name: Install Latest SDK
        run: |
          pip install google-genai pypdf # 安装新版库

      - name: Run Ingestion Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ingest_papers.py

      - name: Force Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add knowledge_base/*.md
          # 强制 commit 并 push，确保文件回到仓库
          git commit -m "Sync: New strategy summaries generated" || echo "No changes to commit"
          git push origin main
          
      # 新增：任务完成后的 Discord 通知步骤
      - name: Send Notification to Discord
        if: always() # 无论成功还是失败都发送通知，方便你排查
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          status="${{ job.status }}"
          if [ "$status" = "success" ]; then
            msg="✅ 知识库同步成功！新论文已转化为策略摘要。"
          else
            msg="❌ 知识库同步失败！请检查 GitHub Actions 日志排查错误。"
          fi
          curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"$msg\"}" $DISCORD_WEBHOOK_URL
